        <h3  class = "title_advanced"><span style = 'color:rgb(66, 133, 244)'>G</span><span style = 'color:rgb(219, 68, 55)'>o</span><span style = 'color:rgb(244, 180, 0)'>o</span><span style = 'color:rgb(66, 133, 244)'>g</span><span style = 'color:rgb(15,157,88)'>l</span><span style = 'color:rgb(219, 68, 55)'>e</span></h3>

        </div>
        <form action="https://google.com/search" >
        <div class="form-group row " id="container1">
            <label class= "col-sm-2 col-form-label" >all these words:</label>
            <div class="col-sm-6">
                <input type="text"  class="form-control left"  name="as_q" >
            </div>
            <label class= "col-sm-4 col-form-label left" style="font-size: 13px;">Type the important words: <span style="font-family: 'light, Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">tricolor  rat  terrier</label>
        </div>
        <div class="form-group row" id="container1">
            <label class= "col-sm-2 col-form-label">this exact word or frase:</label>
            <div class="col-sm-6">
                <input type="text" class="form-control left"  name="as_epq">
            </div>
            <label class= "col-sm-4 col-form-label left" style="font-size: 13px;">Put exact word in quotes: <span style ="font-family:'light, Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">rat  terrier</span></label>
        </div>
        <div class="form-group row" id="container1">
            <label class= "col-sm-2 col-form-label">any of these words:</label>

                <input type="text" class="form-control left"  name="as_oq">
            </div>
            <label class= "col-sm-4 col-form-label left" style="margin-top: -8px; font-size: 13px;">Put OR between all the words you want:<br>
            <span style="font-family: 'light, Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">miniature</span> <span style="font-family: sans-serif; ">OR</span> <span style="font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">standard</span></label>
        </div>
        <div class="from-group row" id="container1">
            <label class= "col-sm-2 col-form-label">none of these words:</label>
            <div class="col-sm-6">
                <input type="text" class="form-control label left"  name="as_eq">
            </div>
             <label class= "col-sm-4 col-form-label left"  style="margin-top: -8px; font-size: 13px;">Put a minus sign just before words you don't want: <br>
                <span style="font-family: 'light, Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">-rodent, -"Jack Russel" </span></label>
